services:
  db:
    image: postgres:16.11-alpine3.23
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - my_db:/var/lib/postgresql/data

  library:
    build:
      context: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    command: >
      sh -c "
      python manage.py wait_for_db &&
      python manage.py migrate &&
      python manage.py create_superuser || true &&
      python manage.py runserver 0.0.0.0:8000
      "
    depends_on:
      - db

  qcluster:
    build:
      context: .
    env_file:
      - .env
    volumes:
      - ./:/app
    command: >
      sh -c "
      python manage.py wait_for_db &&
      python manage.py qcluster
      "
    depends_on:
      - db
      - library

volumes:
  my_db:
